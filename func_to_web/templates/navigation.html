<nav class="functoweb-sidebar">
    <div class="functoweb-sidebar-header">
        <a href="{{ prefix }}/" class="functoweb-sidebar-close" aria-label="Ir a Home">
            <span class="functoweb-sidebar-close-icon">◄</span>
        </a>
    </div>

    <div class="functoweb-sidebar-menu">
        {% for item in navigation_data %}
        <a href="{{ prefix }}{{ item.url }}" class="functoweb-nav-link">{{ item.name }}</a>
        {% endfor %}
    </div>
</nav>

<button class="functoweb-sidebar-mobile-toggle" onclick="toggleSidebarMobile()" aria-label="Toggle menu">
    <span></span>
    <span></span>
    <span></span>
</button>

<div class="functoweb-sidebar-overlay" onclick="closeSidebarMobile()"></div>
