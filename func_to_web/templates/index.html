{% extends "base.html" %}

{% block navigation %}
{% endblock %}

{% block content %}
<div class="functoweb-container">
    <h1 class="functoweb-title">{{ page_title }}</h1>

    <div class="functoweb-items">
        {% for item in items %}
        <a href="{{ prefix }}/{{ item.slug }}" class="functoweb-function-card">
            <h3 class="functoweb-function-card-title">{{ item.name }}</h3>
            {% if item.description %}
            <p class="functoweb-function-card-description">{{ item.description }}</p>
            {% endif %}
        </a>
        {% endfor %}
    </div>
</div>
{% endblock %}
